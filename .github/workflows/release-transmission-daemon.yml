name: Release transmission-daemon workflow

on:
  push:
    tags:
      - 'transmission-daemon*'
  workflow_dispatch:
    inputs:
      transmission_version:
        description: 'Transmission 版本号（例如：4.1.1）'
        required: true
        default: '4.1.1'

jobs:
  build-transmission-daemon:
    strategy:
      matrix:
        arch: [amd64, arm64]
    uses: ./.github/workflows/build_transmission-daemon_base_workflow.yml
    with:
      arch: ${{ matrix.arch }}
      transmission_version: ${{ github.event.inputs.transmission_version || '4.1.1' }}

  release-transmission-daemon:
    runs-on: ubuntu-latest
    needs: [build-transmission-daemon]
    env:
      TRANSMISSION_VERSION: ${{ github.event.inputs.transmission_version || '4.1.1' }}
      RELEASE_NAME: transmission-static-${{ github.event.inputs.transmission_version || '4.1.1' }}

    steps:
      - uses: actions/checkout@v4.2.2

      # 下载所有架构的构建产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.7

      # 创建统一的 Release（只创建一次）
      - name: Create unified release
        run: |
          # 设置最终 Release 名称：transmission-static-4.1.1
          export RELEASE_TAG="transmission-static-${{ env.TRANSMISSION_VERSION }}"
          
          echo "创建统一 Release: $RELEASE_TAG"
          echo "上传所有架构文件..."

          # 创建 Release
          gh release create "$RELEASE_TAG" \
            --title "Transmission Static Build ${{ env.TRANSMISSION_VERSION }}" \
            --notes "自动构建的静态版本，包含 amd64 / arm64 架构" \
            transmission-daemon-*/transmission-daemon-*.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
